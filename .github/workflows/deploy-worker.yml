name: Deploy Worker (Cloudflare)

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'wrangler.toml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

# Forces older JS actions (still on Node 20) to run on Node 24
# until their maintainers ship Node-24-compatible releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # GEMINI_API_KEY is set via `wrangler secret put` (encrypted, runtime-only).
          # It does NOT need to be passed here.

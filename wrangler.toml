name = "excusegenerator"
main = "worker/index.js"
compatibility_date = "2025-05-01"

[dev]
port = 8787

# Default deploy URL: https://whoopsie-worker.<your-account>.workers.dev
# To put the Worker on a custom subdomain (requires the zone to be on Cloudflare DNS),
# uncomment the block below and replace the pattern:
#
# [[routes]]
# pattern = "whoopsie-api.aks1n3d.com/*"
# zone_name = "aks1n3d.com"
# custom_domain = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1


